version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sevima-backend-prod
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    environment:
      # Railway/Production environment
      - PORT=${PORT:-8080}
      - APP_ENV=${APP_ENV:-production}
      
      # Database (Supabase or local)
      - DB_HOST=${DB_HOST:-postgres}
      - DB_PORT=${DB_PORT:-5432}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME:-postgres}
      
      # JWT Secrets (MUST be set in production)
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRE_HOURS=${JWT_EXPIRE_HOURS:-24}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - JWT_REFRESH_EXPIRE_HOURS=${JWT_REFRESH_EXPIRE_HOURS:-168}
      
      # AI Service
      - AI_SERVICE_URL=${AI_SERVICE_URL:-http://ai-service:8000}
      
      # API Keys
      - WAN2_API_KEY=${WAN2_API_KEY}
    
    depends_on:
      postgres:
        condition: service_healthy
      ai-service:
        condition: service_started
    
    restart: always
    networks:
      - sevima-network
    
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:${PORT:-8080}/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # PostgreSQL (only if using local database, not for Supabase)
  postgres:
    image: postgres:15-alpine
    container_name: sevima-postgres-prod
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-postgres}
    
    ports:
      - "${DB_PORT:-5432}:5432"
    
    volumes:
      - postgres_data:/var/lib/postgresql/data
    
    restart: always
    networks:
      - sevima-network
    
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # AI Service
  ai-service:
    build:
      context: .
      dockerfile: Dockerfile.ai
    container_name: sevima-ai-service-prod
    
    ports:
      - "8000:8000"
    
    environment:

      - WAN2_API_KEY=${WAN2_API_KEY}
    
    restart: always
    networks:
      - sevima-network

volumes:
  postgres_data:
    driver: local

networks:
  sevima-network:
    driver: bridge

