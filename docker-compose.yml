version: '3.8'

services:
  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      - APP_PORT=5000
      - APP_ENV=production
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres123
      - DB_NAME=go_auth
      - JWT_SECRET=change-this-secret-in-production
      - JWT_EXPIRE_HOURS=24
      - JWT_REFRESH_SECRET=change-this-refresh-secret
      - JWT_REFRESH_EXPIRE_HOURS=168
      - AI_SERVICE_URL=http://ai-service:8000
      - LTX_API_KEY=${LTX_API_KEY:-your-ltx-api-key-here}
      - RUNWAY_API_KEY=${RUNWAY_API_KEY:-your-runway-api-key-here}
      - WAN2_API_KEY=${WAN2_API_KEY:-your-wan2-api-key-here}
    depends_on:
      postgres:
        condition: service_healthy
      ai-service:
        condition: service_started
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: go_auth
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  ai-service:
    build:
      context: .
      dockerfile: Dockerfile.ai
    ports:
      - "8000:8000"
    environment:
      - LTX_API_KEY=${LTX_API_KEY:-your-ltx-api-key-here}
      - RUNWAY_API_KEY=${RUNWAY_API_KEY:-your-runway-api-key-here}
      - WAN2_API_KEY=${WAN2_API_KEY:-your-wan2-api-key-here}
    restart: unless-stopped

volumes:
  postgres_data:
